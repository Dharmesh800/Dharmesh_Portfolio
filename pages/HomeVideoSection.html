<section id="HomeVideoSection">
    <div class="video-grid" id="videoGrid"></div>
</section>
<style>
    #HomeVideoSection {
        display: flex;
        justify-content: center;
        flex: 1;
        /* border: 1px black solid; */
    }
    
    .video-grid {
        
        max-width: 1200px;
        /* border: 1px black solid; */
    }

    .video-grid {        
        padding: 20px;
        columns: 4 300px;
        column-gap: 20px;
    }

    .video-card {
        display: inline-block;
        width: 100%;
        margin-bottom: 20px;
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        background: #181818;
        box-shadow: 0 5px 15px rgba(0, 0, 0, .5);
        break-inside: avoid;
    }

    .video-card video {
        width: 100%;
        height: auto;
        display: block;
        background: black;
    }

    .watermark {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, .3);
        padding: 6px 10px;
        border-radius: 5px;
        font-size: 10px;
        pointer-events: none;
        z-index: 999;
    }

    /* Responsive */
    @media(max-width:1920px) {
        .video-grid {
            columns: 3 280px;
        }
    }

    @media(max-width:900px) {
        .video-grid {
            columns: 2 280px;
        }
    }

    @media(max-width:600px) {
        .video-grid {
            columns: 1;
        }
    }
</style>
