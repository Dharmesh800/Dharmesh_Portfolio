<style>
    /* ============================================================
   HEADER
   ============================================================ */
    .header {
        position: sticky;
        top: 0;
        z-index: 50;
        /* background: rgba(15, 15, 15, 0.7); */
        backdrop-filter: blur(200px);
        border-top: 1px solid var(--primary);
        border-bottom: 1px solid var(--primary);
    }

    .header-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
    }

    .header_Logo h1 {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 1.3rem;
        margin: 0;
        color: var(--fg);
    }

    .header_Logo h1 span {
        color: var(--accent);
    }

    /* Nav links */
    .nav-container {
        display: flex;
        align-items: center;
        gap: 28px;
    }

    .nav-item {
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 500;
        text-decoration: none;
        transition: color 0.2s;
    }

    .nav-item:hover,
    .nav-item.active {
        color: var(--accent);
    }

    /* Hamburger button — hidden on desktop */
    .menu-btn {
        display: none;
        background: transparent;
        color: var(--fg);
        border: 0;
        font-size: 1.5rem;
        cursor: pointer;
        z-index: 60;
    }

    /* ============================================================
   RESPONSIVE — TABLET & MOBILE (≤900px)
   ============================================================ */
    @media (max-width: 900px) {
        .menu-btn {
            display: block;
            cursor: pointer;
        }

        .nav-container {
            display: none;
            position: absolute;
            top: 64px;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(200,
                    200,
                    200,
                    1);
            /* semi-transparent instead of solid --bg */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            /* Safari support */
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            padding: 16px 20px 20px;
            border-bottom: 1px solid var(--border);
        }

        .nav-container.open {
            display: flex;
        }

        .nav-item {
            width: 100%;
            padding: 12px 4px;
            border-bottom: 1px solid var(--border);
            font-size: 1rem;
        }

        .nav-item:last-child {
            border-bottom: none;
        }
    }

    /* ============================================================
   SMALL PHONES (≤380px)
   ============================================================ */
    @media (max-width: 380px) {
        .header-inner {
            padding: 0 14px;
        }

        .header_Logo h1 {
            font-size: 1.1rem;
        }
    }
</style>
